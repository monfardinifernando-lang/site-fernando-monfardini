<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Monograma FM — Fernando Monfardini">
  <title>FM</title>

  <!-- Fundo grafite -->
  <rect width="200" height="200" fill="#1C1F23"/>

  <!-- Círculo ocre -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#A07840" stroke-width="4"/>

  <!--
    Letra F — sem serifa, bold
    Montante vertical + barra superior + barra do meio
  -->
  <!-- Montante vertical F -->
  <rect x="34" y="52" width="14" height="96" fill="#A07840"/>
  <!-- Barra superior F -->
  <rect x="34" y="52" width="52" height="14" fill="#A07840"/>
  <!-- Barra do meio F -->
  <rect x="34" y="91" width="40" height="12" fill="#A07840"/>

  <!--
    Letra M — com detalhe do V invertido no centro
    Dois montantes verticais + dois diagonais que se encontram
    formando um V apontado para baixo no centro superior
  -->
  <!-- Montante esquerdo M -->
  <rect x="102" y="52" width="14" height="96" fill="#A07840"/>
  <!-- Montante direito M -->
  <rect x="154" y="52" width="14" height="96" fill="#A07840"/>
  <!-- Diagonal esquerda (desce do topo esquerdo até o vértice central) -->
  <polygon points="102,52 116,52 137,100 123,100" fill="#A07840"/>
  <!-- Diagonal direita (desce do topo direito até o vértice central) -->
  <polygon points="154,52 168,52 147,100 133,100" fill="#A07840"/>
  <!-- Vértice V (triângulo pontado para baixo, detalhe refinado) -->
  <polygon points="123,100 147,100 135,118" fill="#A07840"/>

</svg>
