<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Monograma FM — Fernando Monfardini">
  <title>FM</title>
  <!-- Fundo grafite -->
  <rect width="100" height="100" fill="#1C1F23"/>

  <!-- Borda fina em ocre -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="#A07840" stroke-width="1.5"/>

  <!--
    Letra F — traços limpos, sem serifa
    Montante vertical + 2 barras horizontais
  -->
  <!-- Montante vertical do F -->
  <rect x="22" y="26" width="5" height="48" fill="#F5F2EC"/>
  <!-- Barra superior do F -->
  <rect x="22" y="26" width="26" height="5" fill="#F5F2EC"/>
  <!-- Barra do meio do F -->
  <rect x="22" y="46" width="20" height="4" fill="#F5F2EC"/>

  <!--
    Letra M — dois montantes + dois diagonais centrais
    Montante esquerdo, diagonal esquerda, diagonal direita, montante direito
  -->
  <!-- Montante esquerdo do M -->
  <rect x="55" y="26" width="5" height="48" fill="#F5F2EC"/>
  <!-- Montante direito do M -->
  <rect x="73" y="26" width="5" height="48" fill="#F5F2EC"/>

  <!--
    Diagonais do M usando polygon
    Diagonal esquerda: desce do topo esquerdo até o centro base
    Diagonal direita:  desce do topo direito até o centro base
  -->
  <!-- Diagonal esquerda (para baixo-direita até centro) -->
  <polygon points="55,26 60,26 69.5,55 64.5,55" fill="#F5F2EC"/>
  <!-- Diagonal direita (para baixo-esquerda até centro) -->
  <polygon points="73,26 78,26 68.5,55 63.5,55" fill="#F5F2EC"/>

  <!-- Detalhe: linha ocre fina abaixo das letras -->
  <rect x="22" y="78" width="56" height="1.5" fill="#A07840"/>
</svg>
